<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>2D/3D MYANMAR AI PRO</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Pyidaungsu','Segoe UI',Arial;}
    :root{ --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --gold:#fbbf24; --red:#ef4444; --text:#f8fafc; }
    body{background:var(--bg);color:var(--text);padding-bottom:50px;}
    .container{max-width:480px;margin:0 auto;padding:12px;}
    
    /* Live Section */
    .live-card{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:20px;padding:30px 10px;text-align:center;margin-bottom:20px;border:2px solid #334155;box-shadow:0 10px 25px rgba(0,0,0,0.4);}
    #live-num{font-size:90px;font-weight:900;color:var(--accent);line-height:1;text-shadow:0 0 15px rgba(56,189,248,0.5);}
    .live-label{font-size:12px;color:#94a3b8;letter-spacing:3px;margin-bottom:10px;text-transform:uppercase;}

    /* Results Table */
    .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
    .res-item{background:var(--card);padding:15px;border-radius:15px;text-align:center;border:1px solid #334155;}
    .res-time{font-size:11px;color:#94a3b8;margin-bottom:5px;}
    .res-num{font-size:24px;font-weight:900;color:var(--gold);}

    /* AI Prediction Section */
    .section-title{font-size:15px;font-weight:bold;margin:25px 0 12px;padding-left:12px;border-left:5px solid var(--red);color:#fff;}
    .predict-box{background:var(--card);border-radius:18px;padding:20px;border:1px solid #334155;box-shadow:0 4px 6px rgba(0,0,0,0.1);}
    
    .grid-10{display:grid;grid-template-columns:repeat(5, 1fr);gap:10px;}
    .num-chip{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);padding:12px 0;text-align:center;border-radius:10px;font-weight:bold;color:#fff;font-size:18px;}
    
    .threed-row{display:flex;justify-content:space-between;gap:12px;margin-top:15px;}
    .threed-chip{flex:1;background:rgba(251,191,36,0.1);border:1px solid var(--gold);color:var(--gold);padding:15px;text-align:center;border-radius:12px;font-weight:900;font-size:22px;}
    
    .ai-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;padding:2px 8px;border-radius:50px;margin-bottom:10px;}
    .wait-msg{font-size:13px;color:#64748b;text-align:center;padding:30px 0;}
  </style>
</head>
<body>

<div class="container">
  <div class="live-card">
    <div class="live-label">Thai 2D Real-time</div>
    <div id="live-num">--</div>
    <div id="live-time" style="font-size:11px;color:#475569;margin-top:10px;">Connecting...</div>
  </div>

  <div class="res-grid">
    <div class="res-item"><div class="res-time">11:00 AM</div><div class="res-num" id="t1100">--</div></div>
    <div class="res-item"><div class="res-time">12:01 PM</div><div class="res-num" id="t1201">--</div></div>
    <div class="res-item"><div class="res-time">03:00 PM</div><div class="res-num" id="t1500">--</div></div>
    <div class="res-item"><div class="res-time">04:30 PM</div><div class="res-num" id="t1630">--</div></div>
  </div>

  <div class="section-title">☀️ MORNING (12:01) AI + TRADITION</div>
  <div class="predict-box">
    <div class="ai-badge">Daily Rotation</div>
    <div class="grid-10" id="m2d-ui"></div>
    <div class="threed-row" id="m3d-ui"></div>
  </div>

  <div class="section-title">🌙 EVENING (04:30) AI + TRADITION</div>
  <div class="predict-box" id="evening-box">
    <div id="e-wait" class="wait-msg">မနက် ၁၂:၀၁ ထွက်ဂဏန်းကို AI က ဗေဒင်တွက်နည်းဖြင့် စစ်ဆေးနေသည်...</div>
    <div id="e-content" style="display:none;">
        <div class="ai-badge" style="background:var(--gold);color:#000;">Power & Natkhat Sync</div>
        <div class="grid-10" id="e2d-ui"></div>
        <div class="threed-row" id="e3d-ui"></div>
    </div>
  </div>
</div>

<script>
  const API = 'https://api.thaistock2d.com/live';
  function mmNow(){ return new Date(Date.now() + new Date().getTimezoneOffset()*60000 + 6.5*3600000); }

  async function sync(){
    try {
      const res = await fetch(API);
      const data = await res.json();
      document.getElementById('live-num').textContent = data.live.twod;
      document.getElementById('live-time').textContent = "Updated: " + mmNow().toLocaleTimeString();
      
      const mResult = data.result.find(r => r.open_time.includes("12:01"))?.twod || null;
      
      data.result.forEach(r => {
        if(r.open_time.includes("11:00")) document.getElementById('t1100').textContent = r.twod;
        if(r.open_time.includes("12:01")) document.getElementById('t1201').textContent = r.twod;
        if(r.open_time.includes("15:00")) document.getElementById('t1500').textContent = r.twod;
        if(r.open_time.includes("16:30")) document.getElementById('t1630').textContent = r.twod;
      });

      runAI(data.live.set, data.live.value, mResult);
    } catch(e) { console.error(e); }
  }

  function runAI(set, val, morningOut) {
    const d = mmNow().getDate(), m = mmNow().getMonth()+1, y = mmNow().getFullYear();
    const dateSeed = d + m + y;

    // --- Morning AI ---
    let m2d = [];
    for(let i=0; i<10; i++) m2d.push((dateSeed * (i+7) + 14) % 100);
    document.getElementById('m2d-ui').innerHTML = m2d.map(n => `<div class="num-chip">${n.toString().padStart(2,'0')}</div>`).join('');
    
    let m3d = [(dateSeed*11)%900+100, (dateSeed*13)%900+100, (dateSeed*17)%900+100];
    document.getElementById('m3d-ui').innerHTML = m3d.map(n => `<div class="threed-chip">${n}</div>`).join('');

    // --- Evening AI (Tradition + AI) ---
    if(morningOut && morningOut !== '--') {
      document.getElementById('e-wait').style.display = 'none';
      document.getElementById('e-content').style.display = 'block';

      const mNum = parseInt(morningOut);
      
      // မြန်မာ့အယူအစ (ပါဝါ၊ နက္ခတ် နှင့် နေ့နံ တွက်ချက်မှု)
      const powers = {0:5, 1:6, 2:7, 3:8, 4:9, 5:0, 6:1, 7:2, 8:3, 9:4};
      const natkhats = {0:7, 1:8, 2:9, 3:5, 4:6, 5:3, 6:4, 7:0, 8:1, 9:2};

      let e2d = new Set();
      // ၁။ မနက်ထွက်ဂဏန်း၏ ပါဝါ နှင့် နက္ခတ်ကို အခြေခံ
      const m1 = Math.floor(mNum/10), m2 = mNum%10;
      e2d.add(parseInt(`${powers[m1]}${powers[m2]}`)); 
      e2d.add(parseInt(`${natkhats[m1]}${natkhats[m2]}`));
      
      // ၂။ နေ့နံ Seed နှင့် AI Randomness ပေါင်းစပ်ခြင်း (မနက်ဖြန် မနက်ပိုင်း Logic လိုမျိုး)
      for(let i=0; e2d.size < 10; i++) {
        let n = ((mNum + i + d) * 19 + 27) % 100;
        e2d.add(n);
      }

      document.getElementById('e2d-ui').innerHTML = Array.from(e2d).map(n => `<div class="num-chip">${n.toString().padStart(2,'0')}</div>`).join('');

      // 3D Evening (Myanmar Style: SET+Value+MorningSuffix)
      const sL = set ? set.toString().split('.')[1]?.charAt(1) || '0' : '0';
      const vL = val ? val.toString().split('.')[0]?.slice(-1) || '0' : '0';
      const mSuffix = mNum % 10;
      
      let e3d = [
        `${sL}${vL}${mSuffix}`,
        `${powers[sL]}${vL}${mSuffix}`,
        `${sL}${powers[vL]}${mSuffix}`
      ];
      document.getElementById('e3d-ui').innerHTML = e3d.map(n => `<div class="threed-chip">${n}</div>`).join('');
    }
  }

  sync();
  setInterval(sync, 5000);
</script>
</body>
</html>
