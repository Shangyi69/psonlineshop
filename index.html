<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Movie Recap Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f1a;  /* နောက်ခံအရောင် မူရင်းနဲ့တူအောင် */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .iframe-container {
            width: 100%;
            max-width: 1200px;  /* မင်း website အကျယ်လိုက် */
            height: 95vh;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 2px solid #ffd96630;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white; /* iframe မပေါ်ခင် အဖြူခံ */
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe 
            src="https://phoe2004-recap-shan.hf.space" 
            title="PS Movie Recap Pro"
            loading="lazy"
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
        >
            သင်၏ browser က iframe ကို မထောက်ပံ့ပါ။
        </iframe>
    </div>
</body>
</html>
