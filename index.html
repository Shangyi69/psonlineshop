<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS Movie Recap Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0f1a;
            min-height: 100vh;
            display: flex;
        }
        .fullscreen-iframe {
            width: 100vw;     /* browser အကျယ်အပြည့် */
            height: 100vh;    /* browser အမြင့်အပြည့် */
            border: none;
            position: fixed;  /* နေရာချိန်ကို သေချာစေဖို့ */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="fullscreen-iframe">
        <iframe 
            src="https://phoe2004-recap-shan.hf.space" 
            title="PS Movie Recap Pro"
            allowfullscreen
            sandbox="allow-same-origin allow-scripts allow-popups allow-forms"
        >
            သင်၏ browser က iframe ကို မထောက်ပံ့ပါ။
        </iframe>
    </div>
</body>
</html>
